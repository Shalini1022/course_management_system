<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Progress</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="logo">CourseHub</div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="progress.html" class="active">Progress</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <!-- Progress Section -->
    <section class="progress-section">

        <h1>My Learning Progress</h1>
        <p>Track your completed courses and learning progress.</p>

        <div class="progress-card">

            <h3>Web Development</h3>

            <div class="progress-bar">
                <div class="progress-fill web">80%</div>
            </div>

        </div>

        <div class="progress-card">

            <h3>Python Programming</h3>

            <div class="progress-bar">
                <div class="progress-fill python">65%</div>
            </div>

        </div>

        <div class="progress-card">

            <h3>Java Programming</h3>

            <div class="progress-bar">
                <div class="progress-fill java">50%</div>
            </div>

        </div>

        <div class="progress-card">

            <h3>Artificial Intelligence</h3>

            <div class="progress-bar">
                <div class="progress-fill ai">90%</div>
            </div>

        </div>

    </section>

</body>
</html>
